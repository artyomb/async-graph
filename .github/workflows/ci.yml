name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.4"
          bundler-cache: true
      - run: bundle exec rake
      - name: Run RuboCop
        run: |
          mkdir -p results
          set -o pipefail
          bundle exec rubocop --display-cop-names --extra-details --cache false 2>&1 | tee results/rubocop.log
      - name: Upload RuboCop log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: rubocop-log
          path: results/rubocop.log
      - run: bash examples/run.sh
